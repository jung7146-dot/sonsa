<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 의학이론 빈칸채우기</title>
<style>
:root{
  --bg:#f5f0e8;--surface:#fffdf7;--surface2:#f0ebe0;--border:#d4c9b0;
  --text:#2a2318;--text2:#6b5e48;--accent:#8b3a2a;--accent2:#2a5c8b;
  --success:#2d6a4f;--warn:#b5541a;--danger:#8b1a1a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Serif KR',serif,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.1rem;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:.5rem}
.topbar-title{font-size:.92rem;font-weight:700;color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:.52rem 1rem;border:none;border-radius:4px;font-size:.81rem;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:#a0452f}
.btn-s{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-s:hover{background:var(--border)}
.btn-sm{padding:.35rem .7rem;font-size:.73rem}
.btn-w{width:100%}
.stats-bar{display:flex;gap:1px;background:var(--border);flex-shrink:0}
.stat{flex:1;background:var(--surface);padding:.5rem .2rem;text-align:center}
.stat-n{font-size:.92rem;font-weight:700;color:var(--accent);display:block}
.stat-l{font-size:.58rem;color:var(--text2)}
.main-body{flex:1;overflow-y:auto;padding:.9rem}
.list-header{font-size:.7rem;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.6rem}
.card-list{display:flex;flex-direction:column;gap:.38rem}
.card-row{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:.8rem 1rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:.7rem;transition:all .13s}
.card-row:hover{border-color:var(--accent);transform:translateX(2px)}
.card-row-title{font-size:.84rem;line-height:1.5;flex:1}
.card-row-right{text-align:right;flex-shrink:0}
.badge{font-size:.64rem;padding:.13rem .4rem;border-radius:3px;display:inline-block}
.badge-new{background:rgba(42,92,139,.12);color:var(--accent2)}
.badge-due{background:rgba(139,58,42,.12);color:var(--accent)}
.badge-ok{background:rgba(45,106,79,.12);color:var(--success)}
.card-stars{font-size:.66rem;color:var(--warn);margin-top:.15rem}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(42,35,24,.45);z-index:50;align-items:center;justify-content:center;padding:1.2rem}
.modal-overlay.show{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1.8rem;width:100%;max-width:340px}
.modal-box h3{font-size:.95rem;margin-bottom:.3rem;color:var(--accent)}
.modal-desc{font-size:.78rem;color:var(--text2);margin-bottom:1.2rem;line-height:1.6}
.mode-btns{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1rem}
.mode-btn{padding:.9rem .5rem;border:2px solid var(--border);border-radius:5px;cursor:pointer;background:var(--surface);text-align:center;transition:all .15s;font-family:inherit}
.mode-btn.selected{border-color:var(--accent);background:rgba(139,58,42,.05)}
.mode-btn .mi{font-size:1.3rem;display:block;margin-bottom:.3rem}
.mode-btn .ml{font-size:.78rem;font-weight:600}
.mode-btn .ms{font-size:.66rem;color:var(--text2);margin-top:.1rem;display:block}
.study-top{display:flex;align-items:center;gap:.6rem;padding:.7rem .9rem;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.study-title{font-size:.8rem;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prog-text{font-size:.7rem;color:var(--text2);flex-shrink:0}
.prog-bar{height:3px;background:var(--border);flex-shrink:0}
.prog-fill{height:100%;background:var(--accent);transition:width .3s}
.study-body{flex:1;overflow-y:auto;padding:.9rem;max-width:720px;width:100%;margin:0 auto}
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;box-shadow:0 2px 8px rgba(42,35,24,.07)}
.qcard-meta{display:flex;justify-content:space-between;align-items:center;padding:.42rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border)}
.qcard-num{font-size:.67rem;color:var(--text2)}
.qcard-star{font-size:.67rem;color:var(--warn)}
.qcard-state{font-size:.6rem;padding:.1rem .32rem;border-radius:3px;background:#e8dfc8;color:var(--text2)}
.qcard-body{padding:1rem 1.1rem;font-size:.86rem;line-height:1.95}
.qcard-body table{border-collapse:collapse;width:100%;margin:.4rem 0;font-size:.81rem}
.qcard-body th,.qcard-body td{border:1px solid var(--border);padding:.38rem .6rem;vertical-align:middle}
.qcard-body th{background:var(--surface2);font-weight:600}
.qcard-body h3,.qcard-body h4{margin:.65rem 0 .22rem;font-size:.82rem;color:var(--text2)}
.qcard-body ul,.qcard-body ol{padding-left:1.2rem;margin:.2rem 0}
.qcard-body li{margin-bottom:.15rem}
.qcard-body p{margin-bottom:.32rem}
.qcard-body strong{color:var(--accent)}
.blank-input{
  border:none;border-bottom:2px solid var(--warn);
  background:#fffbe8;padding:.1rem .35rem;
  font-family:inherit;font-size:.84rem;color:var(--text);
  min-width:5rem;border-radius:2px 2px 0 0;
  outline:none;transition:background .15s,border-color .15s;
  vertical-align:middle;display:inline-block;
}
.blank-input:focus{background:#fff3cd;border-color:var(--accent2);}
.blank-input:disabled{cursor:default;opacity:.9;}
.action-row{padding:.85rem 1rem;display:flex;justify-content:center}
.btn-reveal{background:var(--accent2);color:#fff;padding:.65rem 2rem;border:none;border-radius:4px;font-size:.86rem;font-weight:500;cursor:pointer;font-family:inherit}
.btn-reveal:hover{background:#1e4a6e}
.score-section{display:none;padding:.85rem 1.1rem;border-top:1px solid var(--border);background:var(--surface2)}
.score-section.show{display:block}
.score-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;font-size:.78rem;color:var(--text2)}
.score-pct{font-size:1rem;font-weight:700;color:var(--accent)}
.score-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.score-fill{height:100%;border-radius:4px;transition:width .5s}
.ans-box{display:none;border-top:1px solid var(--border);padding:1rem 1.1rem;background:rgba(42,92,139,.03)}
.ans-box.show{display:block}
.ans-label{font-size:.67rem;color:var(--accent2);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.55rem}
.ans-body{font-size:.84rem;line-height:1.9}
.ans-body table{border-collapse:collapse;width:100%;font-size:.8rem;margin:.3rem 0}
.ans-body th,.ans-body td{border:1px solid var(--border);padding:.36rem .58rem;vertical-align:top}
.ans-body th{background:rgba(42,92,139,.07);font-weight:600}
.ans-body ul,.ans-body ol{padding-left:1.2rem}
.ans-body li{margin-bottom:.12rem}
.ans-body p{margin-bottom:.28rem}
.ans-body strong{color:var(--accent2)}
.rating-wrap{display:none;flex-direction:column;gap:.5rem;margin-top:.8rem}
.rating-wrap.show{display:flex}
.rating-info{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:.65rem .9rem;font-size:.78rem;line-height:1.7;color:var(--text2)}
.rating-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:.42rem}
.rbtn{padding:.65rem .2rem;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:var(--surface);text-align:center;transition:all .15s;font-family:inherit}
.rbtn:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.1)}
.rbtn .rn{font-weight:600;display:block;font-size:.82rem}
.rbtn .ri{font-size:.61rem;color:var(--text2);margin-top:.08rem;display:block}
.rbtn.r1{border-color:var(--danger)}.rbtn.r2{border-color:var(--warn)}.rbtn.r3{border-color:var(--success)}
.rbtn.suggested{box-shadow:0 0 0 2px var(--accent2);background:rgba(42,92,139,.06)}
.done-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.done-box{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1.8rem;width:100%;max-width:360px;text-align:center}
.done-box h2{font-size:1.1rem;color:var(--accent);margin-bottom:.3rem}
.done-box p{font-size:.78rem;color:var(--text2);margin-bottom:1.2rem}
.done-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:1.2rem}
.dstat{background:var(--surface);padding:.7rem .2rem}
.dstat .n{font-size:1.1rem;font-weight:700;color:var(--accent);display:block}
.dstat .l{font-size:.58rem;color:var(--text2)}
.toast{position:fixed;bottom:1.1rem;right:1.1rem;background:var(--text);color:var(--bg);padding:.55rem .9rem;border-radius:4px;font-size:.74rem;opacity:0;transform:translateY(5px);transition:all .22s;z-index:99;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="main" class="screen active">
  <div class="topbar">
    <span class="topbar-title">📖 의학이론 빈칸채우기</span>
    <div style="display:flex;gap:.35rem">
      <button id="btn-reset" class="btn btn-s btn-sm">↺ 초기화</button>
      <button id="btn-new" class="btn btn-s btn-sm">🆕 신규학습</button>
      <button id="btn-start" class="btn btn-p btn-sm">복습 시작</button>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat"><span class="stat-n" id="st-total">0</span><span class="stat-l">전체</span></div>
    <div class="stat"><span class="stat-n" id="st-due">0</span><span class="stat-l">오늘</span></div>
    <div class="stat"><span class="stat-n" id="st-new">0</span><span class="stat-l">신규</span></div>
    <div class="stat"><span class="stat-n" id="st-learned">0</span><span class="stat-l">학습완료</span></div>
  </div>
  <div class="main-body">
    <div class="list-header">문제 목록 (클릭 → 바로 학습)</div>
    <div id="card-list" class="card-list"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-start">
  <div class="modal-box">
    <h3>복습 시작</h3>
    <p class="modal-desc" id="modal-desc"></p>
    <div class="mode-btns">
      <div class="mode-btn selected" id="mode-order" onclick="selectMode('order')">
        <span class="mi">📋</span><span class="ml">순서대로</span><span class="ms">1번부터 차례로</span>
      </div>
      <div class="mode-btn" id="mode-random" onclick="selectMode('random')">
        <span class="mi">🔀</span><span class="ml">랜덤</span><span class="ms">무작위 순서</span>
      </div>
    </div>
    <div style="display:flex;gap:.4rem">
      <button id="modal-cancel" class="btn btn-s" style="flex:1">취소</button>
      <button id="modal-confirm" class="btn btn-p" style="flex:1">시작</button>
    </div>
  </div>
</div>

<!-- 신규학습 모달 -->
<div class="modal-overlay" id="modal-new">
  <div class="modal-box">
    <h3>신규 학습</h3>
    <p class="modal-desc" id="new-modal-desc"></p>
    <div class="mode-btns">
      <div class="mode-btn selected" id="new-mode-order" onclick="selectNewMode('order')">
        <span class="mi">📋</span><span class="ml">순서대로</span><span class="ms">1번부터 차례로</span>
      </div>
      <div class="mode-btn" id="new-mode-random" onclick="selectNewMode('random')">
        <span class="mi">🔀</span><span class="ml">랜덤</span><span class="ms">무작위 순서</span>
      </div>
    </div>
    <div style="margin-bottom:.8rem">
      <label class="modal-lbl" style="font-size:.7rem;color:var(--text2);font-weight:600;display:block;margin-bottom:.35rem">한 번에 학습할 문제 수</label>
      <div style="display:flex;gap:.4rem">
        <button class="new-cnt-btn btn btn-s btn-sm" data-n="10" style="flex:1">10개</button>
        <button class="new-cnt-btn btn btn-s btn-sm" data-n="20" style="flex:1;background:var(--accent);color:#fff">20개</button>
        <button class="new-cnt-btn btn btn-s btn-sm" data-n="30" style="flex:1">30개</button>
        <button class="new-cnt-btn btn btn-s btn-sm" data-n="999" style="flex:1">전체</button>
      </div>
    </div>
    <div style="display:flex;gap:.4rem">
      <button id="new-modal-cancel" class="btn btn-s" style="flex:1">취소</button>
      <button id="new-modal-confirm" class="btn btn-p" style="flex:1">시작</button>
    </div>
  </div>
</div>

<div id="study" class="screen">
  <div class="study-top">
    <button id="btn-exit" class="btn btn-s btn-sm">← 나가기</button>
    <div class="study-title" id="study-title"></div>
    <div class="prog-text" id="prog-text">0/0</div>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="study-body">
    <div class="qcard">
      <div class="qcard-meta">
        <span class="qcard-num" id="q-num"></span>
        <span class="qcard-star" id="q-star"></span>
        <span class="qcard-state" id="q-state"></span>
      </div>
      <div class="qcard-body" id="q-body"></div>
      <div class="action-row" id="action-row">
        <button class="btn-reveal" id="btn-reveal">✓ 정답 확인</button>
      </div>
      <div class="score-section" id="score-section">
        <div class="score-row"><span>빈칸 입력률</span><span class="score-pct" id="score-pct">0%</span></div>
        <div class="score-bar"><div class="score-fill" id="score-fill" style="width:0%"></div></div>
      </div>
      <div class="ans-box" id="ans-box">
        <div class="ans-label">▼ 정답</div>
        <div class="ans-body" id="ans-body"></div>
      </div>
    </div>
    <div class="rating-wrap" id="rating-wrap">
      <div class="rating-info" id="rating-info"></div>
      <div class="rating-btns">
        <button class="rbtn r1" data-r="1"><span class="rn">❌ 모름</span><span class="ri" id="ri1"></span></button>
        <button class="rbtn r2" data-r="2"><span class="rn">△ 애매</span><span class="ri" id="ri2"></span></button>
        <button class="rbtn r3" data-r="3"><span class="rn">⭕ 알았음</span><span class="ri" id="ri3"></span></button>
      </div>
    </div>
    <div id="next-wrap" style="display:none;margin-top:.5rem">
      <button id="btn-next" class="btn btn-s btn-w" style="border:1px dashed var(--border);color:var(--text2);font-size:.78rem">건너뛰기 (평가 없이 다음 문제 →)</button>
    </div>
  </div>
</div>

<div id="done" class="screen">
  <div class="done-wrap">
    <div class="done-box">
      <h2>복습 완료 🎉</h2>
      <p>오늘의 빈칸채우기를 마쳤습니다</p>
      <div class="done-stats">
        <div class="dstat"><span class="n" id="d-total">0</span><span class="l">총문제</span></div>
        <div class="dstat"><span class="n" id="d-avg">0%</span><span class="l">평균입력률</span></div>
        <div class="dstat"><span class="n" id="d-good">0</span><span class="l">정답</span></div>
        <div class="dstat"><span class="n" id="d-again">0</span><span class="l">재복습</span></div>
      </div>
      <button id="btn-done" class="btn btn-p btn-w">돌아가기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

\u2b1c (\ub0b4\ubc18\ubd80\ud558(LCL), \uc678\ubc18\ubd80\ud558(MCL)) / \u2b1cBLANK\u2b1c / \u2b1cBLANK\u2b1c ||\n| \uce58\ub8cc | \ub300\ubd80\ubd84 \ubcf4\uc874\uc801 \uce58\ub8cc (\ub0c9\ucc1c\uc9c8, \ubcf4\uc870\uae30, \ubaa9\ubc1c, \uadfc\ub825\uac15\ud654 \uc6b4\ub3d9) / \u2b1cBLANK\u2b1c \uc2dc \uc218\uc220\uc801 \uce58\ub8cc ||\n\n<details>\n<summary>\uc815\ub2f5 \ubcf4\uae30</summary>\n\n**1) \ud574\ubd80\ud559**  \n\u3000\u2460 MCL: \ub300\ud1f4\uace8 \ub0b4\uacfc / \uacbd\uace8 \ub0b4\uacfc  \n\u3000\u2461 LCL: \ub300\ud1f4\uace8 \uc678\uacfc / \ube44\uace8\ub450  \n\n**2) MCL(\ub0b4\uce21 \uce21\ubd80\uc778\ub300)**  \n\u3000\ud2b9\uc9d5: \uc2ac\uad00\uc808 \uc778\ub300 \uc911 \uac00\uc7a5 \ud754\ud55c \uc190\uc0c1, \ub0a8\uc131>>>\uc5ec\uc131 / \ub300\ubd80\ubd84 \ub2e8\ub3c5 \uc190\uc0c1  \n\u3000\uc190\uc0c1\uae30\uc804: \ubb34\ub98e \ubc14\uae65\ucabd \uc9c1\uc811 \ud0c0\uaca9 \u2192 \uc2ac\uad00\uc808\uc774 \uc548\uc73c\ub85c \ubc00\ub9bc  \n\u3000\uc99d\uc0c1: \ubb34\ub98e \uc548\ucabd \ud1b5\uc99d + \ubd80\uc885, \uc555\ud1b5, \ubd88\uc548\uc815\uc131  \n\u3000\uac80\uc0ac: Stress View - \uc678\ubc18\ubd80\ud558 / MRI / \uad00\uc808\ub0b4\uc2dc\uacbd  \n\u3000\uce58\ub8cc: \ubcf4\uc874\uc801(\ub0c9\ucc1c\uc9c8, \ubcf4\uc870\uae30, \uadfc\ub825\uac15\ud654) / \uc778\ub300\uc18c\uc2e4\u00b7\ud68c\uc804\ubd88\uc548\uc815\uc131\u00b7\ud0c0\ubd80\uc704 \ub3d9\ubc18\uc190\uc0c1 \uc2dc \uc218\uc220  \n\n**LCL(\uc678\uce21 \uce21\ubd80\uc778\ub300)**  \n\u3000\ud2b9\uc9d5: \ub2e8\ub3c5\uc190\uc0c1 \uac70\uc758 \uc5c6\uc74c / \uac70\uc758 \ub300\ubd80\ubd84 \ub3d9\ubc18\uc190\uc0c1  \n\u3000\uc190\uc0c1\uae30\uc804: \ubb34\ub98e \uc548\ucabd \uc9c1\uc811 \ud0c0\uaca9 \u2192 \uc2ac\uad00\uc808\uc774 \ubc16\uc73c\ub85c \ubc00\ub9bc  \n\u3000\uc99d\uc0c1: \ubb34\ub98e \ubc14\uae65\ucabd \ud1b5\uc99d + \ubd80\uc885, \uc555\ud1b5, \ubd88\uc548\uc815\uc131  \n\u3000\uac80\uc0ac: Stress View - \ub0b4\ubc18\ubd80\ud558 / MRI / \uad00\uc808\ub0b4\uc2dc\uacbd  \n\u3 2f9\uaca8 \uc804\uc704 \uc815\ub3c4\ub97c \uce21\uc815  \n\u3000\u2462 **[\u2b1cBLANK\u2b1c** \uac80\uc0ac]: \uc559\uc640\uc704, \ubc1c\uc744 \ub0b4\ud68c\uc804\ud55c \uc0c1\ud0dc\ub85c \ud558\uc9c0\uac70\uc0c1 \u2192 \uc2ac\uad00\uc808 \uad74\uace1\ud558\uba74\uc11c \uc678\ubc18\ub825\uc744 \uac00\ud568  \n\u3000\u3000\u2192 10~40\ub3c4 \uad74\uace1 \uc2dc \uc544\ud0c8\uad6c\ub41c \uacbd\uace8\uc774 \uc815\uc0c1 \uc815\ubcf5\ub428  \n\u3000\u2463 \uc601\uc0c1\uac80\uc0ac: \u2b1cBLANK\u2b1c, \u2b1cBLANK\u2b1c, \u2b1cBLANK\u2b1c  \n\n6) \uce58\ub8cc  \n\u3000\u2460 \uc218\uc0c1 \ucd08\uae30: \u2b1cBLANK\u2b1c \u2192 \uad00\uc808\ucc9c\uc790, \ub0c9\ucc1c\uc9c8, \uc555\ubc15, \uac70\uc0c1  \n\u3000\u2461 \ubcf4\uc874\uc801 \uce58\ub8cc: \u2b1cBLANK\u2b1c, \uadfc\ub825\uac15\ud654 \uc6b4\ub3d9  \n\u3000\u2462 \uc218\uc220\uc801 \uce58\ub8cc: \u2b1cBLANK\u2b1c (\u2b1cBLANK\u2b1c, \u2b1cBLANK\u2b1c)  \n\n<details>\n<summary>\uc815\ub2f5 \ubcf4\uae30</summary>\n\n1) \uc55e\ucabd / \ud68c\uc804 / \ub300\uac01\uc120  \n2) \u2460 \ud68c\uc804\ub825 / \u2461 \uc678\ubc18\ub825  \n3) \ub0b4\uce21 \uce21\ubd80\uc778\ub300 / \ubc18\uc6d4\uc0c1 \uc5f0\uace8  \n4) Popping sound / \ud608\uad00\uc808\uc99d  \n5)  \n\u3000\u2460 \uc804\ubc29\uc11c\ub78d \uac80\uc0ac / 90\ub3c4 / \uacbd\uace8 \uadfc\uc704\ubd80  \n\u3000\u2461 Lachman \uac80\uc0ac / 20~30\ub3c4 / \uc804\ubc29  \n\u3000\u2462 \ucd95\uc774\ub3d9(\ud53c\ubd07\uc26c\ud504\ud2b8) \uac80\uc0ac  \n\u3000\u2463 MRI, \uad00\uc808\ub0b4\uc2dc\uacbd, Stress view  \n6)  \n\u3000\u2460 \ud608\uad00\uc808\uc99d  \n\u3000\u2461 \ubcf4\uc870\uae30  \n\u3000\u2462 \uc2ed\uc790\uc778\ub300 \uc7ac\uac74\uc220 / \uc790\uac00\uac74, \ub3d9\uc885\uac74  \n\n</details>\n\n---\n\n\n## 26. \ud6c4\ubc29\uc2ed\uc790\uc778\ub300(PCL) \uc190\uc0c1 \u2605\u2605\u2605\n\n1) \ud574\ubd80\ud559\uc801 \ud2b9\uc9d5  \n\u3000- \ubb34\ub98e \ub4a4\ucabd\uc5d0 \uc704\uce58\ud55c \ub9e4\uc6b0 \u2b1cBLANK\u2b1c \uc778\ub300  \n\u3000- \uacbd\uace8\uc774 \u2b1cBLANK\u2b1c \uc73c\ub85c \ube60\uc9c0\ub294 \uac83\uc744 \uc81c\ud55c  \n\n2) \uc190\uc0c1\uae30\uc804  \n\u3000\u2460 \u2b1cBLANK\u2b1c \uc5d0 \uc758\ud55c \uc190\uc0c1  \n\u3000\u2461 \uadfc\uc704 \uacbd\uace8 \uc804\uba74\uc5d0 \u2b1cBLANK\u2b1c (\uad50\ud1b5\uc0ac\uace0 \uacc4\uae30\ud310 \uc190\uc0c1, \ucda9\ub3cc)  \n\n3) \ub3d9\ubc18 \uc190\uc0c1  \n\u3000- \ub300\ubd80\ubd84 \u2b1cBLANK\u2b1c \ub97c \ud3ec\ud568\ud55c \uc5ec\ub7ec \ubd80\uc704\uc640 \ubcf5\ud569 \uc190\uc0c1  \n\u3000- \uc6b4\ub3d9\uc120\uc218\uc758 \uacbd\uc6b0 \u2b1cBLANK\u2b1c \uc774 \uc788\uc744 \uc218 \uc788\uc74c  \n\n4) \uc99d\uc0c1: \ud1b5\u00b7\ubd80\u00b7\uc555, \u2b1cBLANK\u2b1c  \n\n5) \uc9c4\ub2e8\uac80\uc0ac  \n\u3000\u2460 **[\u2b1cBLANK\u2b1c** \uac80\uc0ac]: \uc2ac\uad00\uc808 \u2b1cBLANK\u2b1c \ub3c4 \uad74\uace1 \ud6c4 \uac80\uc0ac\uc790\uac00 \u2b1cBLANK\u2b1c \uc5d0 \uc9c1\uc811 \ud6c4\ubc29 \ubd80\ud558\ub97c \uac00\ud558\uc5ec \uc804\uc704 \uc815\ub3c4\ub97c \uce21\uc815  \n\u3000\u2461 **[\u2b1cBLANK\u2b1c** \uac80\uc0ac]: \uc2ac\uad00\uc808 90\ub3c4 \uad74\uace1 \uc0c1\ud0dc\uc5d0\uc11c \ub300\ud1f4\uc0ac\ub450\uadfc\uc744 \uc218\ucd95\uc2dc\ud0a4\uba74 \ud6c4\ubc29 \uc804\uc704\ub41c \uacbd\uace8\uc774 \uc55e\uc73c\ub85c \uc804\uc9c4  \n\u3000\u2462 \u2b1cBLANK\u2b1c: \uc559\uc640\uc704 \uc0c1\ud0dc\uc5d0\uc11c \uc2ac\uad00\uc808\uc744 90\ub3c4 \uad74\uace1\ud558\uba74 \uacbd\uace8\uc774 \ud6c4\ubc29\uc73c\ub85c \uc804\uc704\ub418\ub294 \uac83\uc744 \ud655\uc778  \n\u3000\u2463 \uc601\uc0c1\uac80\uc0ac: \u2b1cBLANK\u2b1c, \u2b1cBLANK\u2b1c, \u2b1cBLANK\u2b1c  \n\n6) \uce58\ub8cc  \n\u3000\u2460 \ubcf4\uc874\uc801 \uce58\ub8cc: \uad00\uc808\uc774 \uc548\uc815\ub41c \u2b1cBLANK\u2b1c \uc758 \uacbd\uc6b0, \ubcf4\uc870\uae30, \uadfc\ub825\uac15\ud654 \uc6b4\ub3d9  \n\u3000\u2461 \uc218\uc220\uc801 \uce58\ub8cc: \ub300\ubd80\ubd84 \u2b1cBLANK\u2b1c (\u2b1cBLANK\u2b1c, \u2b1cBLANK\u2b1c)  \n\n<details>\n<summary>\uc815\ub2f5 \ubcf4\uae30</summary>\n\n1) \uad75\uc740(\uc0c8\ub07c\uc190\uac00\ub77d \uc815\ub3c4) / \ud6c4\ubc29  \n2) \u2460 \uac15\ub825\ud55c \ud798 / \u2461 \uc9c1\uc811 \ud0c0\uaca9  \n3) \ud6c4\uc678\uce21 \uad6c\uc870\ubb3c / \ub2e8\ub3c5 \uc190\uc0c1  \n4) \uad00\uc808 \ubd88\uc548\uc815  \n5)  \n\u3000\u2460 \ud6c4\ubc29\uc804\uc704 \uac80\uc0ac / 90\ub3c4 / \uacbd\uace8 \uadfc\uc704\ubd80  \n\u3000\u2461 \ub300\ud1f4\uc0ac\ub450\uadfc \ud65c\uc131 \uac80\uc0ac  \n\u3000\u2462 \ud6c4\ubc29\ucc98\uc9d0(posterior sag)  \n\u3000\u2463 MRI, \uad00\uc808\ub0b4\uc2dc\uacbd, Stress View  \n6)  \n\u3000\u2460 \ubd80\ubd84\ud30c\uc5f4  \n\u3000\u2461 \uc2ed\uc790\uc778\ub300 \uc7ac\uac74\uc220 / \uc790\uac00\uac74, \ub3d9\uc885\uac74  \n\n</details>\n\n---\n\n\n## 27. \ube44\uace8\uc2e0\uacbd \uc190\uc0c1 \u2605\u2605\u2605\n\n1) \uc190\uc0c1\uc6d0\uc778  \n\u3000\u2460 \uc5f4\uc0c1  \n\u3000\u2461 \uc2ac\uad00\uc808 \ud0c8\uad6c  \n\u3000\u2462 \ube44\uace8 \ubc0f \uacbd\uace8 \uc0c1\ub2e8 \uace8\uc808  \n\u3000\u2463 \uc11d\uace0\uace0\uc815 \ub610\ub294 \ubd80\uc885\uc5d0 \uc758\ud55c \uc2e0\uacbd\uc555\ubc15  \n2) \ubd84\ub958: \u2b1cBLANK\u2b1c \ube44\uace8\uc2e0\uacbd, \u2b1cBLANK\u2b1c \ube44\uace8\uc2e0\uacbd, \u2b1cBLANK\u2b1c \ube44\uace8\uc2e0\uacbd  \n3) \uc99d\uc0c1: \u2b1cBLANK\u2b1c, \ub2e4\ub9ac\uce21\uba74\uacfc \ud2b9\ud788 \u2b1cBLANK\u2b1c \uac10\uac01 \uc18c\uc2e4  \n\n<details>\n<summary>\uc815\ub2f5 \ubcf4\uae30</summary>\n\n2) \ucd1d\ube44\uace8\uc2e0\uacbd, \uc2ec\ube44\uace8\uc2e0\uacbd, \ucc9c\ube44\uace8\uc2e0\uacbd  \n3) \uc871\ud558\uc218 / \uc871\ubc30\ubd80  \n\n</details>\n\n---\n\n\n## 28. \uc544\ud0ac\ub808\uc2a4\uac74 \ud30c\uc5f4 \u2605\u2605\n\n1) \uad6c\uc131\uadfc\uc721: \u2b1cBLANK\u2b1c, \u2b1cBLANK\u2b1c \u2192 \uc885\uace8 \ud6c4\uba74 \uc0c1\ubc29\uc5d0 \ubd99\uc5b4\uc788\uc74c  \n\u3000\uc778\uccb4\uc5d0\uc11c \uac00\uc7a5 \uac15\ub825\ud558\uace0 \ud070 \uac74, \u2b1cBLANK\u2b1c (=\uae4c\uce58\ubc1c, \uc778\uccb4\ub97c \ub4e4\uc5b4\uc62c\ub9ac\ub294 \ud798)\uc744 \ud558\uac8c \ud568  \n\n2) \uc190\uc0c1\uae30\uc804  \n\u3000\u2460 \uac11\uc790\uae30 \uaca9\ub82c\ud55c \uc6b4\ub3d9 (\uac11\uc790\uae30 \uc810\ud504)  \n\u3000\u2461 \u2b1cBLANK\u2b1c \uc0ac\uc774\uc5d0\uc11c \uc8fc\ub85c \ud30c\uc5f4  \n\n3) \uc99d\uc0c1  \n\u3000- \ud30c\uc5f4 \uc2dc \ub4a4\uafc8\uce58\uc5d0\uc11c \ub454\ud0c1\ud55c \uc18c\ub9ac (\u2b1cBLANK\u2b1c)  \n\u3000- \uac11\uc791\uc2a4\ub7ec\uc6b4 \ud1b5\uc99d, \uc885\ucc3d, \u2b1cBLANK\u2b1c \ubcf4\ud589 \ubd88\uac00  \n\n4) \uac80\uc0ac  \n\u3000\u2460 \u2b1cBLANK\u2b1c: \u2b1cBLANK\u2b1c \uc774 \uc548\ub418\uba74 \ud30c\uc5f4\ub428\uc744 \uc758\ubbf8  \n\u3000\u2461 \uce21\uba74 X-ray: \u2b1cBLANK\u2b1c \uc18c\uc2e4  \n\u3000\u2462 \u2b1cBLANK\u2b1c, \u2b1cBLANK\u2b1c (\uac00\uc7a5 \uc815\ud655)  \n\n5) \uce58\ub8cc  \n\u3000\u2460 \u2b1cBLANK\u2b1c \uc0c1\ud0dc\uc5d0\uc11c \uc11d\uace0\uace0\uc815  \n\u3000\u2461 \uc644\uc804\ud30c\uc5f4 \uc2dc \u2b1cBLANK\u2b1c  \n\n<details>\n<summary>\uc815\ub2f5 \ubcf4\uae30</summary>\n\n1) \ube44\ubcf5\uadfc, \uac00\uc790\ubbf8\uadfc / \uc871\uc800\uad74\uace1  \n2) \u2461 \uc885\uace8 \ubd80\ucc29\ubd80 2~6cm  \n3) \ud37d\u00b7\ud131 / \uae4c\uce58\ubc1c  \n4)  \n\u3000\u2460 \ud1b0\uc2a8\uc555\ucc29\uac80\uc0ac / \uc871\uc800\uad74\uace1  \n\u3000\u2461 \uce74\uac70\uc0bc\uac01(Kager's triangle)  \n\u3000\u2462 \ucd08\uc74c\ud30c, MRI  \n5) \u2460 \uc871\uc800\uad74\uace1 / \u2461 \uac74\ubd09\ud569\uc220  \n\n</details>\n\n---\n\n\n## 29. \uc871\uc800 \uadfc\ub9c9\uc5fc \u2605\u2605\n\n1) \uc704\uce58  \n\u3000- \u2b1cBLANK\u2b1c \uc5d0\uc11c \uc2dc\uc791, \ubc1c\ubc14\ub2e5 \uc55e\ucabd\uc73c\ub85c 5\uac1c \uac00\uc9c0\ub97c \ubed7\uc5b4 \uc871\uc800 \uae30\uc800\ubd80 \uc704\uc5d0 \ubd99\uc740 \ub450\uaecd\uace0 \uac15\ud55c \uc12c\uc720\ub760  \n\u3000- \ubc1c\uc758 \u2b1cBLANK\u2b1c \uc720\uc9c0 / \ubcf4\ud589 \uc2dc\uc791\uc5d0 \uc911\uc694\ud55c \uc5ed\ud560  \n\n2) \uc6d0\uc778: \ube44\ub9cc, \uc911\ub144, \ud3b8\ud3c9\uc871, \uc694\uc871, \ubb34\ub9ac\ud55c   sForget(d,s,ret){return this.w[11]*Math.pow(d,-this.w[12])*(Math.pow(s+1,this.w[13])-1)*Math.exp((1-ret)*this.w[14])},
  schedule(c,r){
    const map={1:1,2:2,3:4},mr=map[r]||r,now=Date.now(),days=c.lastReview?(now-c.lastReview)/86400000:0;
    if(!c.stability){c.stability=this.iS(mr);c.difficulty=this.iD(mr);c.state=mr===1?'learning':'review';}
    else{
      const ret=this.curve(days,c.stability);c.difficulty=this.nD(c.difficulty,mr);
      if(c.state==='review'){c.stability=mr===1?this.sForget(c.difficulty,c.stability,ret):this.sRecall(c.difficulty,c.stability,mr,ret);if(mr===1)c.state='relearning';}
      else{c.stability=this.sShort(c.stability,mr);if(mr>=3)c.state='review';}
    }
    c.stability=Math.max(c.stability,0.1);
    // 등급별 간격: 모름=지금, 애매=최소1일/최대3일, 알았음=최소2일/최대3일
    const minIv=mr===4?2:1;
    c.interval=mr===1?0:Math.min(3,Math.max(minIv,this.iv(c.stability)));
    c.due=mr===1?now:now+c.interval*86400000;
    c.lastReview=now;c.reps=(c.reps||0)+1;c.lapses=(c.lapses||0)+(mr===1?1:0);
    return c;
  },
  preview(c){return[1,2,3].map(r=>{const x=JSON.parse(JSON.stringify(c));this.schedule(x,r);return x.interval;})},
  fmt(d){if(!d||d===0)return'지금';if(d<1)return'10분';if(d===1)return'1일';if(d<30)return Math.round(d)+'일';if(d<365)return Math.round(d/30)+'개월';return Math.round(d/365)+'년';}
};

function parseCards(md){
  const cards=[];
  const sections=md.split(/\n(?=## )/);
  for(const sec of sections){
    const lines=sec.split('\n');
    const tl=lines.find(l=>l.startsWith('## '));
    if(!tl)continue;
    const title=tl.replace(/^##\s*/,'').trim();
    const nm=title.match(/^(\d+)\./);
    const num=nm?parseInt(nm[1]):null;
    const sm=title.match(/(★+)/);
    const stars=sm?sm[1]:'';
    const di=sec.indexOf('<details>');
    let q='',a='';
    if(di!==-1){
      q=sec.substring(sec.indexOf('\n')+1,di).trim();
      const se=sec.indexOf('</summary>');
      const de=sec.lastIndexOf('</details>');
      if(se!==-1&&de!==-1)a=sec.substring(se+10,de).trim();
    }else{
      q=sec.substring(sec.indexOf('\n')+1).trim();
    }
    q=q.replace(/^---\s*$/mg,'').trim();
    if(!title||!q)continue;
    cards.push({id:'c'+num,num,title,stars,question:q,answer:a,
      stability:null,difficulty:null,interval:0,due:null,lastReview:null,reps:0,lapses:0,state:'new'});
  }
  return cards;
}

let bIdx=0;

// ── 표 파서: 빈 셀 포함해서 컬럼 수 유지 ────
function parseTable(m, isQ){
  const rows=m.trim().split('\n').filter(r=>r.trim());
  if(!rows.length)return m;
  // 헤더로 컬럼 수 파악
  const headerParts=rows[0].split('|');
  headerParts.shift();headerParts.pop();
  const colCount=headerParts.length;
  let t='<table>';
  rows.forEach((row,i)=>{
    if(/^\|[-:\s|]+\|$/.test(row.trim()))return; // 구분선 스킵
    const parts=row.split('|');
    parts.shift();parts.pop(); // 앞뒤 빈 요소 제거
    // 컬럼 수에 맞게 빈 셀 패딩
    while(parts.length<colCount)parts.push('');
    const tag=i===0?'th':'td';
    t+=`<tr>${parts.map(c=>`<${tag}>${inl(c.trim(),isQ)}</${tag}>`).join('')}</tr>`;
  });
  return t+'</table>';
}

function md2html(md,isQ){
  if(!md)return'';
  if(isQ)bIdx=0;
  let h=md;

  // 줄 단위로 처리해서 정확하게 변환
  const lines=h.split('\n');
  const out=[];
  let tableLines=[];

  function flushTable(){
    if(!tableLines.length)return;
    out.push(parseTable(tableLines.join('\n'),isQ));
    tableLines=[];
  }

  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    // 표 행
    if(/^\|/.test(line)&&/\|\s*$/.test(line)){
      tableLines.push(line);
      continue;
    }
    flushTable();
    // 헤딩
    if(/^### /.test(line)){out.push('<h4>'+line.replace(/^### /,'')+'</h4>');continue;}
    if(/^## /.test(line)){out.push('<h3>'+line.replace(/^## /,'')+'</h3>');continue;}
    // 리스트
    if(/^[-*] /.test(line)){out.push('<li>'+inl(line.replace(/^[-*]\s*/,''),isQ)+'</li>');continue;}
    // 빈 줄
    if(!line.trim()){out.push('');continue;}
    // 일반 텍스트
    out.push(inl(line,isQ));
  }
  flushTable();

  // li 연속 묶기
  let result='';
  let inList=false;
  for(const o of out){
    if(o.startsWith('<li>')){
      if(!inList){result+='<ul>';inList=true;}
      result+=o;
    }else{
      if(inList){result+='</ul>';inList=false;}
      if(o===''){ result+='</p><p>'; }
      else if(/^<(h[34]|table|ul)/.test(o)){ result+=o; }
      else{ result+=o+'<br>'; }
    }
  }
  if(inList)result+='</ul>';

  // <p> 정리
  result='<p>'+result+'</p>';
  result=result.replace(/<p>(<\/p>|<p>)+/g,'<p>');
  result=result.replace(/(<br>)+<\/p>/g,'</p>');
  result=result.replace(/<p>\s*<\/p>/g,'');
  result=result.replace(/<br>(<h[34]|<table|<ul)/g,'$1');
  return result;
}

function inl(s,isQ){
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g,'<em>$1</em>');
  if(isQ){
    s=s.replace(/⬜BLANK⬜/g,()=>{
      const id='b'+(bIdx++);
      return`<input class="blank-input" id="${id}" type="text" autocomplete="off" spellcheck="false" placeholder="　　">`;
    });
  }else{
    s=s.replace(/⬜BLANK⬜/g,'<span style="color:var(--accent2);font-weight:600;border-bottom:1px dashed var(--accent2);padding:0 .1rem">　　　</span>');
  }
  return s;
}

async function loadProg(){

async function saveProg(){
  const d={};
  cards.forEach(c=>{d[c.id]={stability:c.stability,difficulty:c.difficulty,interval:c.interval,due:c.due,lastReview:c.lastReview,reps:c.reps,lapses:c.lapses,state:c.state};});
  try{
    initFirebase();
    const batch=db.batch();
    Object.entries(d).forEach(([id,data])=>{
      batch.set(db.collection(DB_COL).doc(id),data);
    });
    await batch.commit();
    console.log('✓ Firebase 저장 완료', Object.keys(d).length+'개');
  }catch(e){
    console.warn('Firebase 저장 실패, localStorage 사용',e);
    localStorage.setItem('blankcards_v3',JSON.stringify(d));
  }
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

function renderMain(){
  const now=Date.now();
  const due=cards.filter(c=>c.stability&&c.due&&c.due<=now).length;
  const nw=cards.filter(c=>!c.stability).length;
  const learned=cards.filter(c=>c.stability&&c.due&&c.due>now).length;
  document.getElementById('st-total').textContent=cards.length;
  document.getElementById('st-due').textContent=due;
  document.getElementById('st-new').textContent=nw;
  document.getElementById('st-learned').textContent=learned;
  const list=document.getElementById('card-list');
  list.innerHTML=cards.map(c=>{
    let cls='badge-new',txt='신규';
    if(c.stability&&c.due){
      if(c.due<=now){cls='badge-due';txt='오늘 복습';}
      else{cls='badge-ok';txt=FSRS.fmt(c.interval)+'후';}
    }
    return`<div class="card-row" data-id="${c.id}">
      <div class="card-row-title">${c.title}</div>
      <div class="card-row-right">
        <span class="badge ${cls}">${txt}</span>
        ${c.stars?`<div class="card-stars">${c.stars}</div>`:''}
      </div>
    </div>`;
  }).join('');
  list.querySelectorAll('.card-row').forEach(el=>{
    el.addEventListener('click',()=>{
      const c=cards.find(x=>x.id===el.dataset.id);
      if(c)startSession([c]);
    });
  });
}

let sess={queue:[],idx:0,stats:{total:0,good:0,again:0,scoreSum:0}};

function openStartModal(){

  const nw=cards.filter(c=>!c.stability).slice(0,20);
  const q=[...due,...nw];

  document.getElementById('modal-confirm').onclick=()=>{

    if(mode==='random')shuffle(q2);

}

function startSession(queue){
  sess={queue,idx:0,stats:{total:0,good:0,again:0,scoreSum:0}};
  document.getElementById('modal-start').classList.remove('show');
  showScreen('study');showCard();
}

function showCard(){
  if(sess.idx>=sess.queue.length){finishStudy();return;}
  const c=sess.queue[sess.idx];
  const tot=sess.queue.length;
  document.getElementById('study-title').textContent=c.title;
  document.getElementById('prog-text').textContent=(sess.idx+1)+'/'+tot;
  document.getElementById('prog-fill').style.width=((sess.idx+1)/tot*100)+'%';
  document.getElementById('q-num').textContent=c.num?c.num+'번':'';
  document.getElementById('q-star').textContent=c.stars||'';
  document.getElementById('q-state').textContent=c.stability?'간격 '+FSRS.fmt(c.interval):'NEW';
  bIdx=0;
  document.getElementById('q-body').innerHTML=md2html(c.question,true);
  document.getElementById('ans-body').innerHTML=md2html(c.answer,false);
  document.getElementById('ans-box').classList.remove('show');
  document.getElementById('score-section').classList.remove('show');
  document.getElementById('action-row').style.display='flex';
  document.getElementById('rating-wrap').classList.remove('show');
  document.getElementById('next-wrap').style.display='none';
  const ivs=FSRS.preview(c);
  document.getElementById('ri1').textContent=FSRS.fmt(ivs[0]);
  document.getElementById('ri2').textContent=FSRS.fmt(ivs[1]);
  document.getElementById('ri3').textContent=FSRS.fmt(ivs[2]);
  setTimeout(()=>{const f=document.querySelector('#q-body .blank-input');if(f)f.focus();},80);
}

function reveal(){
  const inputs=[...document.querySelectorAll('#q-body .blank-input')];
  const filled=inputs.filter(i=>i.value.trim()).length;
  const total=inputs.length;
  inputs.forEach(i=>{i.disabled=true;});
  const pct=total>0?Math.round(filled/total*100):100;
  document.getElementById('score-pct').textContent=pct+'%';
  const fill=document.getElementById('score-fill');
  fill.style.width=pct+'%';
  fill.style.background=pct>=80?'var(--success)':pct>=40?'var(--warn)':'var(--danger)';
  document.getElementById('score-section').classList.add('show');
  document.getElementById('ans-box').classList.add('show');
  document.getElementById('action-row').style.display='none';
  document.getElementById('rating-wrap').classList.add('show');
  const autoR=pct>=80?3:pct>=40?2:1;
  const labels=['','❌ 모름','△ 애매','⭕ 알았음'];
  const colors=['','var(--danger)','var(--warn)','var(--success)'];
  document.getElementById('rating-info').innerHTML=
    `빈칸 <strong>${filled} / ${total}개</strong> 입력 → 추천: <strong style="color:${colors[autoR]}">${labels[autoR]}</strong><br>
    <span style="font-size:.7rem;color:var(--text2)">정답을 확인하고 직접 평가해주세요</span>`;
  document.querySelectorAll('.rbtn').forEach(b=>{
    b.classList.toggle('suggested',parseInt(b.dataset.r)===autoR);
  });
  document.getElementById('ans-box').scrollIntoView({behavior:'smooth',block:'nearest'});
  document.getElementById('next-wrap').style.display='block';
}

function doRate(r){
  const c=sess.queue[sess.idx];
  const inputs=[...document.querySelectorAll('#q-body .blank-input')];
  const filled=inputs.filter(i=>i.value.trim()).length;
  const total=inputs.length;
  const pct=total>0?Math.round(filled/total*100):100;
  sess.stats.scoreSum+=pct;sess.stats.total++;
  const orig=cards.find(x=>x.id===c.id);
  if(orig){FSRS.schedule(orig,r);saveProg();}
  if(r===1){
    sess.stats.again++;
    // 모름 → 입력창 초기화하고 바로 다시 풀기
    inputs.forEach(i=>{i.value='';i.disabled=false;i.classList.remove('correct','wrong');});
    document.getElementById('ans-box').classList.remove('show');
    document.getElementById('score-section').classList.remove('show');
    document.getElementById('action-row').style.display='flex';
    document.getElementById('rating-wrap').classList.remove('show');
    document.getElementById('next-wrap').style.display='none';
    // 상태 표시 업데이트
    document.getElementById('q-state').textContent='간격 '+FSRS.fmt(orig?orig.interval:0);
    // 첫 빈칸 포커스
    setTimeout(()=>{const f=document.querySelector('#q-body .blank-input');if(f)f.focus();},80);
    return;
  }else{sess.stats.good++;}
  sess.idx++;showCard();
}

function finishStudy(){
  const avg=sess.stats.total?Math.round(sess.stats.scoreSum/sess.stats.total):0;
  document.getElementById('d-total').textContent=sess.stats.total;
  document.getElementById('d-avg').textContent=avg+'%';
  document.getElementById('d-good').textContent=sess.stats.good;
  document.getElementById('d-again').textContent=sess.stats.again;
  showScreen('done');renderMain();
}

document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  if(!document.getElementById('study').classList.contains('active'))return;
  const inputs=[...document.querySelectorAll('#q-body .blank-input:not([disabled])')];
  const fi=inputs.indexOf(document.activeElement);
  if(fi!==-1&&fi<inputs.length-1){inputs[fi+1].focus();e.preventDefault();}
  else if(fi===inputs.length-1){
    const ar=document.getElementById('action-row');
    if(ar.style.display!=='none'){reveal();e.preventDefault();}
  }
});
